name: Sync Pull Request to Azure Boards

on:
  pull_request_target:
    types: [opened, edited, closed]
    branches:
      - master

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
    - uses: danhellem/github-actions-pr-to-work-item@496254e48adbe7f1ed14a8afb71dc520b2c052ac # master
      env:
        ado_token: '${{ secrets.ADO_PERSONAL_ACCESS_TOKEN }}'
        github_token: '${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}'
        ado_organization: 'msdata'
        ado_project: 'A365'
        ado_wit: 'Task'
        ado_active_state: 'In Progress'
        ado_close_state: 'Done'
        ado_area_path: '${{ secrets.ADO_AREA_PATH }}'
        debug: true
