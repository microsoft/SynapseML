name: PR Validation

on:
  pull_request:
    branches: [ "master" ]
    paths-ignore: [ "**.md", "docs/**", "website/**" ]

jobs:
  python-style:
    name: Python Style Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check formatting with black
        run: |
          pip install -q 'black[jupyter]==22.3.0'
          black --diff --color --extend-exclude 'docs/' . && black --check -q --extend-exclude 'docs/' .

  compile-and-lint:
    name: Compile & Style Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
          cache: sbt

      - name: Install sbt
        run: |
          SBT_VERSION="$(sed -n 's/^sbt.version *= *//p' project/build.properties | tr -d ' ')"
          mkdir -p "$HOME/.local/bin"
          curl -L -o "$HOME/.local/bin/sbt-launch.jar" \
            "https://repo1.maven.org/maven2/org/scala-sbt/sbt-launch/${SBT_VERSION}/sbt-launch-${SBT_VERSION}.jar"
          cat > "$HOME/.local/bin/sbt" <<EOF
          #!/usr/bin/env bash
          exec java -Dsbt.version="${SBT_VERSION}" -jar "$HOME/.local/bin/sbt-launch.jar" "\$@"
          EOF
          chmod +x "$HOME/.local/bin/sbt"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          sbt sbtVersion

      - name: Scalastyle check
        run: sbt scalastyle test:scalastyle

      - name: Compile
        run: sbt compile test:compile
