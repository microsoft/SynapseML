# Test: Does Azure Pipelines resolve container image tag at pipeline start or job start?
#
# This pipeline tests whether a job using `container:` gets an image that was
# pushed by a previous job in the same pipeline run.
#
# Expected behavior if tag resolves at JOB START (Option 1 works):
#   - PushImage pushes a new image with a unique marker
#   - UseImage pulls that image and finds the marker
#   - UseImage PASSES
#
# Expected behavior if tag resolves at PIPELINE START (Option 1 broken):
#   - UseImage pulls the OLD image (or fails if tag didn't exist before)
#   - UseImage FAILS (marker not found)

trigger: none
pr: none

resources:
  containers:
    - container: testimg
      image: synapsemlenyaacr.azurecr.io/synapseml/ci-test:latest
      endpoint: 'synapsemlenyaacr'

pool:
  vmImage: ubuntu-22.04

jobs:
- job: PushImage
  displayName: 'Step 1: Build and push test image with unique marker'
  steps:
    - task: AzureCLI@2
      displayName: 'Build and push test image'
      inputs:
        azureSubscription: 'SynapseML Build'
        scriptLocation: inlineScript
        scriptType: bash
        inlineScript: |
          set -e
          MARKER="built-at-$(date +%s)-$(Build.BuildId)"
          echo "Marker: $MARKER"
          echo "##vso[task.setvariable variable=marker;isOutput=true]$MARKER"

          az acr login --name synapsemlenyaacr

          printf 'FROM ubuntu:22.04\nARG MARKER\nRUN apt-get update && apt-get install -y bash && rm -rf /var/lib/apt/lists/*\nRUN echo "${MARKER}" > /marker.txt\n' \
            > /tmp/Dockerfile.test

          docker build --build-arg MARKER="$MARKER" \
            -t synapsemlenyaacr.azurecr.io/synapseml/ci-test:latest \
            -f /tmp/Dockerfile.test /tmp

          docker push synapsemlenyaacr.azurecr.io/synapseml/ci-test:latest
          echo "Pushed image with marker: $MARKER"
      name: push

- job: UseImage
  displayName: 'Step 2: Run inside container and check for marker'
  dependsOn: PushImage
  variables:
    expectedMarker: $[ dependencies.PushImage.outputs['push.marker'] ]
  container: testimg
  steps:
    - bash: |
        echo "=== CONTAINER IMAGE TAG RESOLUTION TEST ==="
        echo ""
        echo "Expected marker: $(expectedMarker)"
        echo ""
        if [ -f /marker.txt ]; then
          ACTUAL=$(cat /marker.txt)
          echo "Found marker file: $ACTUAL"
          echo ""
          if [ "$ACTUAL" = "$(expectedMarker)" ]; then
            echo "✅ SUCCESS: Container has the marker from THIS pipeline run."
            echo "Tag-to-digest resolution happens at JOB START, not pipeline start."
            echo "Option 1 WORKS."
          else
            echo "⚠️ PARTIAL: Container has a marker, but from a DIFFERENT run."
            echo "Actual:   $ACTUAL"
            echo "Expected: $(expectedMarker)"
            echo "This means the tag resolved to a STALE image."
            exit 1
          fi
        else
          echo "❌ FAILURE: No marker file found in container."
          echo "The container image does not have the marker from PushImage job."
          echo "Either tag resolution happened before PushImage, or the image is wrong."
          exit 1
        fi
      displayName: 'Verify marker from PushImage job'
